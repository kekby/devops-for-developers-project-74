name: push

on:
  push:
    branches:
      - main

env:
  CI: true
  APP_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-for-developers-project-74:latest
  COLOR_MAP: '{ success: "#008000", failure: "#800000" }'
  DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
  DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
  DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
  DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
  DATABASE_HOST: db

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4

      - name: Build Docker image
        run: make compose-ci-build

      - name: Run CI tests
        run: make compose-ci

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build App
        uses: docker/build-push-action@v3
        with:
          context: .
          file: Dockerfile.production
          cache-from: type=registry,ref=${{ env.APP_IMAGE_NAME }}
          cache-to: type=inline
          push: true
          tags: ${{ env.APP_IMAGE_NAME }}